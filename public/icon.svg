<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- 雷达环 -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.08"/>
  <circle cx="64" cy="64" r="42" fill="none" stroke="url(#ringGrad)" stroke-width="1.2" opacity="0.15"/>
  <circle cx="64" cy="64" r="32" fill="none" stroke="url(#ringGrad)" stroke-width="1.2" opacity="0.25"/>
  <circle cx="64" cy="64" r="22" fill="none" stroke="url(#ringGrad)" stroke-width="1.2" opacity="0.4"/>

  <!-- 雷达扫描扇区 -->
  <path d="M64 64 L64 12 A52 52 0 0 1 105 30 Z" fill="url(#sweep)" opacity="0.6"/>
  <path d="M64 64 L64 22 A42 42 0 0 1 98 34 Z" fill="#58a6ff" opacity="0.08"/>

  <!-- 遮挡垫底：深色圆形，防止雷达环从猫身后透出 -->
  <circle cx="64" cy="60" r="36" fill="#0d1117"/>

  <!-- GitHub Invertocat（经典轮廓，全身） -->
  <g transform="translate(64,60) scale(0.58) translate(-64,-64)">
    <path fill="#e6edf3" d="
M64 1C28.7 1 0 29.7 0 65c0 28.4 18.4 52.5 43.9 61 3.2.6 4.4-1.4 4.4-3.1 0-1.5-.1-6.5-.1-11.8-16.1 2.9-20.6-3.9-21.8-7.5-.7-1.8-4-7.5-6.8-9-2.3-1.6-5.7-5.5-.1-5.6 5.3-.1 9.1 4.9 10.3 6.9 6.1 10.3 15.8 7.4 19.7 5.6.6-4.4 2.4-7.4 4.3-9.1-14.5-1.7-29.7-7.3-29.7-32.4 0-7.2 2.6-13.1 6.8-17.7-.7-1.7-3-8.4.7-17.4 0 0 5.5-1.8 18.1 6.8 5.3-1.5 10.9-2.2 16.5-2.2 5.6 0 11.2.8 16.5 2.2 12.6-8.6 18.1-6.8 18.1-6.8 3.6 9 .6 15.7.7 17.4 4.2 4.6 6.8 10.5 6.8 17.7 0 25.2-15.3 30.7-29.8 32.3 2.3 2 4.4 5.9 4.4 12 0 8.6-.1 15.5-.1 17.6 0 1.7 1.2 3.7 4.4 3.1C109.6 117.5 128 93.4 128 65 128 29.7 99.3 1 64 1z
    "/>
  </g>

  <!-- 发现的目标点 -->
  <circle cx="98" cy="22" r="2.2" fill="#58a6ff" opacity="0.9"/>
  <circle cx="98" cy="22" r="5"   fill="#58a6ff" opacity="0.15"/>
  <circle cx="22" cy="90" r="1.8" fill="#bc8cff" opacity="0.8"/>
  <circle cx="22" cy="90" r="4"   fill="#bc8cff" opacity="0.12"/>
  <circle cx="100" cy="98" r="1.5" fill="#3fb950" opacity="0.7"/>
  <circle cx="100" cy="98" r="3.5" fill="#3fb950" opacity="0.1"/>
</svg>
